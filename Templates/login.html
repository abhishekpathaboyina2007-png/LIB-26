<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --blue:#4361ee; --blue-dark:#3451d1; --blue-soft:#eef0fd; --blue-mid:#c7cef9;
      --red:#f03e3e; --red-soft:#fff0f0;
      --text:#1a1f36; --sub:#6b7694; --border:#e8eaf2; --bg:#f4f6fb; --white:#ffffff;
    }
    body {
      font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      position:relative; overflow:hidden;
    }
    body::before {
      content:''; position:fixed; top:-120px; left:-120px;
      width:500px; height:500px;
      background:radial-gradient(circle,#c7cef9 0%,transparent 70%);
      border-radius:50%; pointer-events:none; z-index:0;
    }
    body::after {
      content:''; position:fixed; bottom:-100px; right:-100px;
      width:420px; height:420px;
      background:radial-gradient(circle,#e8f9ed 0%,transparent 70%);
      border-radius:50%; pointer-events:none; z-index:0;
    }
    .page-wrap {
      display:flex; width:860px; min-height:520px;
      background:var(--white); border-radius:24px;
      box-shadow:0 24px 80px rgba(67,97,238,0.12);
      overflow:hidden; position:relative; z-index:1;
      animation:floatUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    @keyframes floatUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
    .left-panel {
      width:340px; flex-shrink:0;
      background:linear-gradient(145deg,var(--blue) 0%,#7c3aed 100%);
      padding:52px 40px; display:flex; flex-direction:column;
      justify-content:space-between; position:relative; overflow:hidden;
    }
    .left-panel::before {
      content:''; position:absolute; top:-60px; right:-60px;
      width:200px; height:200px; background:rgba(255,255,255,0.08); border-radius:50%;
    }
    .left-panel::after {
      content:''; position:absolute; bottom:-40px; left:-40px;
      width:160px; height:160px; background:rgba(255,255,255,0.06); border-radius:50%;
    }
    .lp-logo { display:flex; align-items:center; gap:10px; }
    .lp-icon {
      width:42px; height:42px; background:rgba(255,255,255,0.2);
      border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px;
    }
    .lp-name { font-size:20px; font-weight:800; color:white; }
    .lp-body { position:relative; z-index:1; }
    .lp-body h2 { font-size:26px; font-weight:800; color:white; line-height:1.3; margin-bottom:12px; }
    .lp-body p  { font-size:14px; color:rgba(255,255,255,0.7); line-height:1.6; }
    .lp-stats { display:flex; gap:20px; position:relative; z-index:1; }
    .lp-stat strong { display:block; font-size:22px; font-weight:800; color:white; }
    .lp-stat span   { font-size:11px; color:rgba(255,255,255,0.6); }
    .right-panel { flex:1; padding:52px 44px; display:flex; flex-direction:column; justify-content:center; }
    .right-panel h1 { font-size:24px; font-weight:800; color:var(--text); margin-bottom:6px; }
    .right-panel p.sub { font-size:13px; color:var(--sub); margin-bottom:32px; }
    .error-box {
      display:flex; align-items:center; gap:8px; padding:11px 14px; margin-bottom:20px;
      background:var(--red-soft); border:1px solid #ffc9c9;
      border-radius:10px; font-size:13px; color:var(--red); font-weight:500;
    }
    .field { margin-bottom:18px; }
    label { display:block; font-size:12px; font-weight:700; color:var(--text); letter-spacing:0.4px; text-transform:uppercase; margin-bottom:7px; }
    input {
      width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:10px;
      font-size:14px; font-family:'Plus Jakarta Sans',sans-serif; color:var(--text);
      background:var(--bg); outline:none;
      transition:border-color 0.2s,box-shadow 0.2s,background 0.2s;
    }
    input:focus { border-color:var(--blue); background:var(--white); box-shadow:0 0 0 4px rgba(67,97,238,0.08); }
    input::placeholder { color:var(--sub); }
    .submit-btn {
      width:100%; padding:14px; border:none; border-radius:12px;
      background:var(--blue); color:white; font-size:15px; font-weight:700;
      font-family:'Plus Jakarta Sans',sans-serif; cursor:pointer; margin-top:6px;
      transition:background 0.2s,transform 0.15s,box-shadow 0.2s;
    }
    .submit-btn:hover { background:var(--blue-dark); transform:translateY(-2px); box-shadow:0 8px 20px rgba(67,97,238,0.25); }
    .footer-link { text-align:center; margin-top:20px; font-size:13px; color:var(--sub); }
    .footer-link a { color:var(--blue); font-weight:600; text-decoration:none; }
    .footer-link a:hover { text-decoration:underline; }
  </style>
</head>
<body>
<div class="page-wrap">
  <div class="left-panel">
    <div class="lp-logo">
      <div class="lp-icon">📚</div>
      <div class="lp-name">LibAdmin</div>
    </div>
    <div class="lp-body">
      <h2>Manage your library smarter</h2>
      <p>Track books, members, loans and fines — all in one place.</p>
    </div>
    <div class="lp-stats">
      <div class="lp-stat"><strong>500+</strong><span>Books</span></div>
      <div class="lp-stat"><strong>200+</strong><span>Members</span></div>
      <div class="lp-stat"><strong>99%</strong><span>Uptime</span></div>
    </div>
  </div>
  <div class="right-panel">
    <h1>Welcome back 👋</h1>
    <p class="sub">Sign in to your account to continue</p>
    {% if error %}<div class="error-box">⚠️ {{ error }}</div>{% endif %}
    <form method="POST">
      <div class="field">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="submit-btn">Sign In →</button>
    </form>
    <div class="footer-link">Don't have an account? <a href="/register">Register here</a></div>
  </div>
</div>
</body>
</html>
